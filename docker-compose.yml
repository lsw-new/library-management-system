services:
  mysql:
    image: mysql:8.0
    container_name: library_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-library_db}
      MYSQL_USER: ${MYSQL_USER:-library_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-library_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - library_net
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --innodb-io-capacity=200
      --innodb-read-io-threads=4
      --innodb-write-io-threads=4
      --innodb-change-buffering=all
      --max-connections=50
      --thread-cache-size=16
      --table-open-cache=400
      --sort-buffer-size=4M
      --join-buffer-size=4M
      --tmp-table-size=32M
      --max-heap-table-size=32M
      --key-buffer-size=8M
      --slow-query-log=1
      --long-query-time=0.5
      --log-queries-not-using-indexes=1
      --ngram-token-size=2
      --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: ${APP_IMAGE:-lsw3435255848/library_web:latest}
    pull_policy: missing
    container_name: library_app
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-library_user}:${MYSQL_PASSWORD:-library_pass}@mysql:3306/${MYSQL_DATABASE:-library_db}?charset=utf8mb4
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV: ${FLASK_ENV:-production}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      SMTP_SENDER_PASSWORD: ${SMTP_SENDER_PASSWORD:-}
      AMAP_JS_KEY: ${AMAP_JS_KEY:-}
      AMAP_SECURITY_KEY: ${AMAP_SECURITY_KEY:-}
      AMAP_REST_KEY: ${AMAP_REST_KEY:-}
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - app_images:/app/static/images
      - app_logs:/app/logs
      - app_static_js:/app/static/js
      - app_static_css:/app/static/css
      - app_static_fonts:/app/static/fonts
    networks:
      - library_net
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: library_redis
    restart: unless-stopped
    networks:
      - library_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: library_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - app_images:/var/www/static/images:ro
      - app_static_js:/var/www/static/js:ro
      - app_static_css:/var/www/static/css:ro
      - app_static_fonts:/var/www/static/fonts:ro
    networks:
      - library_net
    depends_on:
      - app
    profiles:
      - production

networks:
  library_net:
    driver: bridge

volumes:
  mysql_data:
  app_images:
  app_logs:
  app_static_js:
  app_static_css:
  app_static_fonts:
  redis_data:
