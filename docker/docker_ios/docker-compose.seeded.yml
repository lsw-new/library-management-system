services:
  mysql:
    image: library_mysql_seeded:latest
    container_name: library_seeded_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-library_db}
      MYSQL_USER: ${MYSQL_USER:-library_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-library_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - seeded_mysql_data:/var/lib/mysql
    networks:
      - seeded_net
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=200
      --thread-cache-size=16
      --table-open-cache=400
      --sort-buffer-size=4M
      --join-buffer-size=4M
      --tmp-table-size=32M
      --max-heap-table-size=32M
      --slow-query-log=1
      --long-query-time=0.5
      --ngram-token-size=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: library_app:latest
    container_name: library_seeded_app
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-library_user}:${MYSQL_PASSWORD:-library_pass}@mysql:3306/${MYSQL_DATABASE:-library_db}?charset=utf8mb4
      SECRET_KEY: ${SECRET_KEY:-change-me-before-production}
      FLASK_ENV: ${FLASK_ENV:-production}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      SMTP_SENDER_PASSWORD: ${SMTP_SENDER_PASSWORD:-}
      AMAP_JS_KEY: ${AMAP_JS_KEY:-}
      AMAP_SECURITY_KEY: ${AMAP_SECURITY_KEY:-}
      AMAP_REST_KEY: ${AMAP_REST_KEY:-}
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - seeded_app_images:/app/static/images
      - seeded_app_logs:/app/logs
    networks:
      - seeded_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: library_seeded_redis
    restart: unless-stopped
    networks:
      - seeded_net
    volumes:
      - seeded_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  seeded_net:
    driver: bridge

volumes:
  seeded_mysql_data:
  seeded_app_images:
  seeded_app_logs:
  seeded_redis_data:
